function verify() {
  let id = document.getElementById("certID").value.trim();
  showResult(id);
}

function showResult(id) {
  let box = document.getElementById("resultBox");

  if (data[id]) {
    let s = data[id];
    box.style.display = "block";
    box.className = "result-box valid";
    box.innerHTML =
      "<b>✅ Valid Certificate</b><br><br>" +
      "<b>Certificate ID:</b> " + id + "<br>" +
      "<b>Registration No.:</b> " + s.reg + "<br>" +
      "<b>Name:</b> " + s.name + "<br>" +
      "<b>Course:</b> " + s.course + "<br>" +
      "<b>Batch:</b> " + s.batch + "<br>" +
      "<b>Event:</b> " + s.event + "<br>" +
      "<b>Date:</b> " + s.date;
  } else {
    box.style.display = "block";
    box.className = "result-box invalid";
    box.innerHTML = "<b>❌ Invalid Certificate ID</b><br>Please check and try again.";
  }
}
